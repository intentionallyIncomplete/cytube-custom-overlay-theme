name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      SKIP_BUILD: 1

    steps:
      - name: Assert CI gate jobs succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const required = ["verify", "e2e", "ci-gate"];
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
                per_page: 100
              }
            );
            const failures = [];
            for (const name of required) {
              const job = jobs.find((j) => j.name === name);
              if (!job) {
                failures.push(`${name}: missing`);
                continue;
              }
              if (job.conclusion !== "success") {
                failures.push(`${name}: ${job.conclusion || job.status}`);
              }
            }
            if (failures.length) {
              core.setFailed(
                `Release blocked — required CI jobs did not succeed:\n${failures.join("\n")}`
              );
            }

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Cache Node.js modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Dependencies
        run: npm ci

      - name: Download CI build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify downloaded artifacts
        run: npm run verify-dist

      - name: Run Semantic Release
        id: release
        run: |
          set -o pipefail
          npx semantic-release 2>&1 | tee semantic-release.log
          sr_exit=${PIPESTATUS[0]}
          if grep -q "Published GitHub release" semantic-release.log; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi
          exit "$sr_exit"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge jsDelivr CDN cache
        if: steps.release.outputs.new_release_published == 'true'
        run: npm run purge-cdn

      - name: Verify CDN deploy
        if: steps.release.outputs.new_release_published == 'true'
        run: npm run verify:cdn
