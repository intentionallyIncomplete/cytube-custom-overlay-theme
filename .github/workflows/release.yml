name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      SKIP_BUILD: 1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Cache Node.js modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Dependencies
        run: npm ci

      - name: Download CI build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify downloaded artifacts
        run: npm run verify-dist

      - name: Run Semantic Release
        id: release
        run: |
          set -o pipefail
          npx semantic-release 2>&1 | tee semantic-release.log
          sr_exit=${PIPESTATUS[0]}
          if grep -q "Published GitHub release" semantic-release.log; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi
          exit "$sr_exit"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge jsDelivr CDN cache
        if: steps.release.outputs.new_release_published == 'true'
        run: npm run purge-cdn

      - name: Verify CDN deploy
        if: steps.release.outputs.new_release_published == 'true'
        run: npm run verify:cdn
